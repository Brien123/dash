spring.application.name=dash-app
server.port=${SERVER_PORT:-8080}

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-dash}
spring.datasource.username=${POSTGRES_USER:-root}
spring.datasource.password=${POSTGRES_PASSWORD:-password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Disable default security user
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:-mongodb://localhost:27017/dash}
spring.data.mongodb.database=${MONGODB_DB:-dash}

# Redis Configuration
spring.redis.host=${REDIS_HOST:-localhost}
spring.redis.port=${REDIS_PORT:-6379}

# JWT Configuration
jwt.secret=${JWT_SECRET:dash-secret-key-change-in-production-at-least-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Multipart / File Upload Configuration
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:-50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:-50MB}

# Swagger Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.elasticsearch.uris=${ELASTICSEARCH_HOST:-http://localhost:9200}
spring.elasticsearch.username=${ELASTICSEARCH_USERNAME:-elastic}
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD:-password}
