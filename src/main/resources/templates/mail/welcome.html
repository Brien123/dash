<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome to dash</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; }
        .container { padding: 20px; }
        .header { font-size: 24px; color: #333; }
        .content { margin-top: 20px; }
        .footer { margin-top: 30px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
<div class="container">
    <h3 class="header">Hello <span th:text="${firstName}">User</span>,</h3>
    <p class="content">Thank you for registering with dash. We are excited to have you on board.</p>
    <p class="footer">Best regards,<br/>The dash Team</p>
</div>
</body>
</html>
